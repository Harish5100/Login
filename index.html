<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Aptitude Test - Access</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <h1>Digital Aptitude</h1>
        <div class="toggle-container">
            <button id="toggle-login" class="toggle-btn active" onclick="showLogin()">Login</button>
            <button id="toggle-register" class="toggle-btn" onclick="showRegister()">Register</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
            <h2>Welcome Back</h2>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="login-username" required placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="Enter your password">
            </div>
            <div class="options">
                <label><input type="checkbox" id="remember-me"> Remember me</label>
            </div>
            <p id="login-error" class="error-message"></p>
            <button type="submit" class="submit-btn">Login</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
            <h2>Create Account</h2>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="reg-username" required placeholder="Choose a username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="reg-password" required placeholder="Choose a password">
            </div>
            <p id="reg-error" class="error-message"></p>
            <p id="reg-success" class="success-message"></p>
            <button type="submit" class="submit-btn">Register</button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const savedUsername = localStorage.getItem('savedUsername');
            const savedPassword = localStorage.getItem('savedPassword');
            if (savedUsername && savedPassword) {
                document.getElementById('login-username').value = savedUsername;
                document.getElementById('login-password').value = savedPassword;
                document.getElementById('remember-me').checked = true;
            }
        });

        function showLogin() {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('toggle-login').classList.add('active');
            document.getElementById('toggle-register').classList.remove('active');
        }

        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('toggle-login').classList.remove('active');
            document.getElementById('toggle-register').classList.add('active');
        }

        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:'
            ? 'http://127.0.0.1:5000'
            : window.location.origin;

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (res.ok) {
                    // Handle remember me
                    if (document.getElementById('remember-me').checked) {
                        localStorage.setItem('savedUsername', username);
                        localStorage.setItem('savedPassword', password);
                    } else {
                        localStorage.removeItem('savedUsername');
                        localStorage.removeItem('savedPassword');
                    }

                    // Store user session info
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    
                    if (data.user.role === 'admin') {
                        window.location.href = 'Admin/admin.html';
                    } else {
                        window.location.href = 'QUIZ/dashboard.html';
                    }
                } else {
                    errorEl.textContent = data.error || 'Login failed';
                }
            } catch (err) {
                errorEl.textContent = 'Server connection failed';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const errorEl = document.getElementById('reg-error');
            const successEl = document.getElementById('reg-success');
            
            errorEl.textContent = '';
            successEl.textContent = '';

            try {
                const res = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (res.ok) {
                    successEl.textContent = 'Registration successful! You can now login.';
                    document.getElementById('register-form').reset();
                    setTimeout(showLogin, 2000);
                } else {
                    errorEl.textContent = data.error || 'Registration failed';
                }
            } catch (err) {
                errorEl.textContent = 'Server connection failed';
            }
        }
    </script>
</body>
</html>
