<!DOCTYPE html>
<html lang="en">
<head>

<title>Digital Aptitude Test</title>
<link rel="stylesheet" href="st.css">
</head>
<body>

<div class="container">
    <h1>Digital Aptitude Test</h1>

    <div id="quiz">
        <h2 id="question">Loading...</h2>
        <div id="options"></div>

        <div class="info">
            <span id="timer">30s</span>

        </div>
    </div>

    <div id="result" class="hidden">
        <h2 id="final-score"></h2>
        <p id="feedback"></p>
        <button onclick="restartQuiz()">Restart</button>
    </div>
</div>
    <script src="st.js"></script>

    <!-- Next Button positioned at bottom-left -->
